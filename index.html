<!DOCTYPE html>
<html>
<head>
  <title>Simulator SQL</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    textarea { width: 100%; height: 100px; }
    button { padding: 10px; margin-top: 10px; }
    table, th, td { border: 1px solid black; border-collapse: collapse; padding: 5px; }
  </style>
</head>

<body>

<h2>Simulator Database & SQL</h2>

<p>Ketik query SQL lalu klik Run</p>

<textarea id="query">SELECT * FROM pelanggan;</textarea><br>
<button onclick="runQuery()">Run</button>

<h3>Hasil:</h3>
<div id="output"></div>

<script>
let data = [
  {id:"P0001", nama:"Andi", alamat:"Jakarta", email:"andi@gmail.com"},
  {id:"P0002", nama:"Budi", alamat:"Bandung", email:"budi@yahoo.com"},
  {id:"P0003", nama:"Citra", alamat:"Jakarta", email:"citra@gmail.com"}
];

function runQuery() {
  let q = document.getElementById("query").value.toLowerCase();
  let output = "<table><tr><th>ID</th><th>Nama</th><th>Alamat</th><th>Email</th></tr>";

  let result = data;

  if(q.includes("where alamat = 'jakarta'")) {
    result = data.filter(d => d.alamat.toLowerCase() === "jakarta");
  }

  if(q.includes("where email like '%yahoo%'")) {
    result = data.filter(d => d.email.includes("yahoo"));
  }

  if(q.includes("select nm_pelanggan")) {
    output = "<table><tr><th>Nama</th></tr>";
    result.forEach(d => {
      output += `<tr><td>${d.nama}</td></tr>`;
    });
    output += "</table>";
    document.getElementById("output").innerHTML = output;
    return;
  }

  result.forEach(d => {
    output += `<tr>
      <td>${d.id}</td>
      <td>${d.nama}</td>
      <td>${d.alamat}</td>
      <td>${d.email}</td>
    </tr>`;
  });

  output += "</table>";
  document.getElementById("output").innerHTML = output;
}
</script>

</body>
</html>
